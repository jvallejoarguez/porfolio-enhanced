<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">El Impostor</title>
  <desc id="desc">Juego de palabras online gratis para descubrir al impostor con tus amigos.</desc>

  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.035"/>
      </feComponentTransfer>
    </filter>

    <symbol id="domino-mask" viewBox="0 0 44 18">
      <ellipse cx="11" cy="9" rx="9" ry="7" fill="#1A1410" stroke="#FBF4E2" stroke-width="2"/>
      <circle cx="11" cy="9" r="3.5" fill="#FBF4E2"/>
      <circle cx="11" cy="9" r="1.5" fill="#1A1410"/>
      <ellipse cx="33" cy="9" rx="9" ry="7" fill="#1A1410" stroke="#FBF4E2" stroke-width="2"/>
      <circle cx="33" cy="9" r="3.5" fill="#FBF4E2"/>
      <circle cx="33" cy="9" r="1.5" fill="#1A1410"/>
      <rect x="20" y="7" width="4" height="4" fill="#1A1410" stroke="#FBF4E2" stroke-width="1"/>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="#F5EBD6"/>
  <path d="M0 468c140-58 268-52 402-8 156 52 312 56 468-18 156-74 214-68 330-8v196H0Z" fill="#EADEC2"/>
  <rect width="1200" height="630" fill="#1A1410" opacity="0.03" filter="url(#grain)"/>

  <!-- floating stickers -->
  <g font-family="'Archivo Black', Impact, sans-serif" font-size="15" letter-spacing="0.08em">
    <g transform="translate(72 52) rotate(-8)">
      <rect width="168" height="40" rx="20" fill="#3DA5A0" stroke="#1A1410" stroke-width="3"/>
      <text x="84" y="27" text-anchor="middle" fill="#FBF4E2">¿QUIÉN ES?</text>
    </g>
    <g transform="translate(948 44) rotate(6)">
      <rect width="188" height="40" rx="20" fill="#E63946" stroke="#1A1410" stroke-width="3"/>
      <text x="94" y="27" text-anchor="middle" fill="#FBF4E2">3–12 JUGADORES</text>
    </g>
    <g transform="translate(88 520) rotate(-5)">
      <rect width="178" height="40" rx="20" fill="#1A1410" stroke="#1A1410" stroke-width="3"/>
      <text x="89" y="27" text-anchor="middle" fill="#FBF4E2">GRATIS · ONLINE</text>
    </g>
  </g>

  <!-- left column — capped width so lobby never overlaps -->
  <g transform="translate(72 108)">
    <g transform="rotate(-2)">
      <rect x="6" y="6" width="118" height="62" rx="12" fill="#1A1410"/>
      <rect width="118" height="62" rx="12" fill="#F4B942" stroke="#1A1410" stroke-width="3"/>
      <text x="59" y="44" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="38" fill="#1A1410" letter-spacing="0.15em">EL</text>
    </g>

    <!-- site logo: ink stroke + 6px hard drop shadow -->
    <g font-family="'Archivo Black', Impact, sans-serif" font-size="100" letter-spacing="-0.02em">
      <text y="182" transform="translate(6 6)" fill="#1A1410">IMPOSTOR</text>
      <text y="182" fill="#E63946" stroke="#1A1410" stroke-width="9" paint-order="stroke fill">IMPOSTOR</text>
    </g>
    <g transform="translate(278 122)">
      <use href="#domino-mask" width="88" height="36"/>
    </g>

    <text y="238" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="600" fill="#3A2F26">
      Todos reciben una palabra secreta. Uno no la tiene.
    </text>
    <text y="282" font-family="'Space Grotesk', system-ui, sans-serif" font-size="28" font-weight="500" fill="#3A2F26">
      Crea una sala y descubre al impostor entre tus amigos.
    </text>

    <g transform="translate(0 318)" font-family="'Archivo Black', Impact, sans-serif" font-size="18" letter-spacing="0.06em">
      <g transform="rotate(-1)">
        <rect x="4" y="4" width="148" height="44" rx="22" fill="#1A1410"/>
        <rect width="148" height="44" rx="22" fill="#3DA5A0" stroke="#1A1410" stroke-width="3.5"/>
        <text x="74" y="30" text-anchor="middle" fill="#FBF4E2">CREAR SALA</text>
      </g>
      <g transform="translate(168 0) rotate(1)">
        <rect x="4" y="4" width="168" height="44" rx="22" fill="#1A1410"/>
        <rect width="168" height="44" rx="22" fill="#F4B942" stroke="#1A1410" stroke-width="3.5"/>
        <text x="84" y="30" text-anchor="middle" fill="#1A1410">UNIRSE</text>
      </g>
    </g>
  </g>

  <!-- lobby card — smaller, tucked right -->
  <g transform="translate(812 118) scale(0.64)">
    <rect x="8" y="8" width="472" height="458" rx="28" fill="#1A1410"/>
    <rect width="472" height="458" rx="28" fill="#FBF4E2" stroke="#1A1410" stroke-width="4"/>

    <text x="28" y="52" font-family="'Archivo Black', Impact, sans-serif" font-size="22" fill="#1A1410">JUGADORES</text>
    <text x="444" y="52" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#3A2F26">4 / 12</text>

    <g transform="translate(40 88)">
      <circle cx="58" cy="58" r="46" fill="#1A1410" transform="translate(5 5)"/>
      <circle cx="54" cy="54" r="46" fill="#F4B942" stroke="#1A1410" stroke-width="3"/>
      <circle cx="30" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <circle cx="78" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <circle cx="40" cy="44" r="7" fill="#1A1410"/>
      <circle cx="68" cy="44" r="7" fill="#1A1410"/>
      <circle cx="42.5" cy="41.5" r="2.2" fill="#FBF4E2"/>
      <circle cx="70.5" cy="41.5" r="2.2" fill="#FBF4E2"/>
      <path d="M 36 64 Q 54 80 72 64" stroke="#1A1410" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <text x="54" y="134" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="15" fill="#1A1410">Ana</text>
    </g>

    <g transform="translate(188 88)">
      <circle cx="58" cy="58" r="46" fill="#1A1410" transform="translate(5 5)"/>
      <circle cx="54" cy="54" r="46" fill="#3DA5A0" stroke="#1A1410" stroke-width="3"/>
      <circle cx="30" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <circle cx="78" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <line x1="36" y1="44" x2="48" y2="44" stroke="#1A1410" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="60" y1="44" x2="72" y2="44" stroke="#1A1410" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="38" y1="66" x2="70" y2="66" stroke="#1A1410" stroke-width="5.5" stroke-linecap="round"/>
      <text x="54" y="134" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="15" fill="#1A1410">Luis</text>
    </g>

    <g transform="translate(40 248)">
      <circle cx="58" cy="58" r="46" fill="#1A1410" transform="translate(5 5)"/>
      <circle cx="54" cy="54" r="46" fill="#E63946" stroke="#1A1410" stroke-width="3"/>
      <circle cx="30" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <circle cx="78" cy="62" r="6.5" fill="#1A1410" opacity="0.14"/>
      <g transform="translate(54 44)">
        <use href="#domino-mask" x="-46" y="-19" width="92" height="38"/>
      </g>
      <path d="M 36 64 Q 54 76 72 64" stroke="#1A1410" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <text x="54" y="134" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="15" fill="#E63946">¿???</text>
      <g transform="translate(78 -6) rotate(8)">
        <rect width="82" height="28" rx="14" fill="#1A1410"/>
        <text x="41" y="20" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="11" fill="#FBF4E2">IMPOSTOR</text>
      </g>
    </g>

    <g transform="translate(188 248)">
      <circle cx="58" cy="58" r="46" fill="none" stroke="#3A2F26" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.5"/>
      <text x="54" y="66" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="38" fill="#3A2F26" opacity="0.45">?</text>
      <text x="54" y="134" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif" font-size="13" font-weight="600" fill="#3A2F26">Esperando...</text>
    </g>

    <g transform="translate(24 404)">
      <rect width="424" height="44" rx="14" fill="#EADEC2" stroke="#1A1410" stroke-width="2.5" stroke-dasharray="7 5"/>
      <text x="212" y="28" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#3A2F26">juegoimpostor.app/?s=K7M2</text>
    </g>
  </g>
</svg>
